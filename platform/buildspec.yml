version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-2

phases:
  pre_build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URL
  build:
    commands:
      - echo "=== Building training image ==="
      - docker build -t ${ECR_URL}/auto-e2e/training:latest -f platform/docker/training/Dockerfile .
      - docker push ${ECR_URL}/auto-e2e/training:latest
      - echo "=== Building data-prep image ==="
      - bash -c 'docker build -t ${ECR_URL}/auto-e2e/data-prep:latest -f platform/docker/data-prep/Dockerfile . || echo WARN data-prep build failed'
  post_build:
    commands:
      - bash -c 'docker push ${ECR_URL}/auto-e2e/data-prep:latest 2>/dev/null || echo data-prep not pushed'
      - echo "Done."

cache:
  paths:
    - '/root/.cache/pip/**/*'
