version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-west-2
    FLYTE_PROJECT: auto-e2e
    FLYTE_DOMAIN: development

phases:
  install:
    commands:
      - pip install -q flytekit
  build:
    commands:
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URL="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - |
        cat > /tmp/flyte.yaml << EOF
        admin:
          endpoint: dns:///flyteadmin.flyte.svc.cluster.local:81
          insecure: true
        EOF
      - >
        pyflyte --config /tmp/flyte.yaml register
        --project $FLYTE_PROJECT
        --domain $FLYTE_DOMAIN
        --image ${ECR_URL}/auto-e2e/training:latest
        --image data-prep=${ECR_URL}/auto-e2e/data-prep:latest
        --image eval=${ECR_URL}/auto-e2e/eval:latest
        --image offline-rl=${ECR_URL}/auto-e2e/offline-rl:latest
        platform/pipelines/
